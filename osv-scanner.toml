# .osv-scanner.toml
# Configuration for OSV-Scanner v2.x (https://github.com/google/osv-scanner).
#
# In v2.x, "IgnoredPaths" is not a config key — path filtering is done via
# CLI flags (--exclude, --offline, etc.). This file is kept for the
# `IgnoredVulns` table.
#
# We deliberately keep IgnoredVulns small. Every entry must be justified
# inline. If a CVE blocks the CI, the right fix is to upgrade the dep,
# not to add a longer-lived ignore.

[[IgnoredVulns]]
# GHSA-2g4f-4pwh-qvx6 — Prototype pollution in ajv
#   - ajv@8.17.1 (dev-only, transitive of jest-config / ts-jest)
#   - CVSS 5.5 (medium), NOT in our high/critical gate
#   - Fixed in 8.18.0
# Why we ignore: bumping ajv to 8.18+ requires updating the entire
# jest+ts-jest toolchain (ajv is pinned by jest internally). This is
# a non-trivial upgrade; we track it as a follow-up. The vulnerability
# is in a DEV dependency — it never ships to consumers.
# Re-evaluate at v1.5.0 (planned bump of jest to 31.x, which unblocks
# ajv 9).
id = "GHSA-2g4f-4pwh-qvx6"
ignoreUntil = 2026-12-31 # Re-check at the next minor release.
reason = "ajv 8.17.1 is dev-only (transitive of jest/ts-jest). Bumping to 8.18+ requires a jest major-version upgrade tracked for v1.5.0. Dev CVEs do not ship to consumers."

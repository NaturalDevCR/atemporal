# .osv-scanner.toml
# Configuration for OSV-Scanner (https://github.com/google/osv-scanner).
#
# Excludes that are NOT vulnerabilities but would otherwise be flagged:
#   - test fixtures in __tests__/fixtures
#   - the `coverage/` directory (instrumented output, never published)
#   - the `dist/` directory (build output)
#   - the `docs/.vitepress/dist/` directory (docs build output)
#
# We deliberately do NOT exclude the lockfile — that's where real CVEs live.

IgnoredPaths = [
  "node_modules",
  "dist",
  "coverage",
  "coverage-strategies",
  "docs/.vitepress/dist",
  "docs/.vitepress/cache",
  "src/__tests__/fixtures",
  "src/examples",
]

[[IgnoredVulns]]
# No vulns are pre-ignored. Every CVE must be reviewed and either fixed
# or explicitly documented in SECURITY.md before being ignored here.
id = "PLACEHOLDER_DO_NOT_USE"
reason = "This is a template; remove it before committing."
expiry = "1970-01-01T00:00:00Z"

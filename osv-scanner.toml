# .osv-scanner.toml
# Configuration for OSV-Scanner v2.x (https://github.com/google/osv-scanner).
#
# In v2.x, "IgnoredPaths" is not a config key — path filtering is done via
# CLI flags (--exclude, --offline, etc.). This file is kept for the
# `IgnoredVulns` table and any future configuration.
#
# We deliberately do NOT pre-ignore any vulnerability. Every CVE must be
# reviewed and either fixed or explicitly documented in SECURITY.md before
# being ignored here.
#
# See https://google.github.io/osv-scanner/configuration/ for the v2 schema.

# Example block — left as a template. Remove or update before adding
# real ignores; expired entries are still parsed.
[[IgnoredVulns]]
id = "PLACEHOLDER_DO_NOT_USE"
reason = "This is a template; remove it before committing."
ignoreUntil = 1970-01-01 # Required format: YYYY-MM-DD; the v1 `expiry` key is gone.

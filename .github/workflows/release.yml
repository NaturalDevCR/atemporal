name: Release (release-please)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_version:
        description: Version from package.json to validate and publish through trusted publishing
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  id-token: write
  issues: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release PR
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.manual.outputs.release_created || steps.release.outputs.release_created }}
      tag_name: ${{ steps.manual.outputs.tag_name || steps.release.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v7
        if: github.event_name == 'workflow_dispatch'
      - name: Validate the manually requested package version
        id: manual
        if: github.event_name == 'workflow_dispatch'
        run: |
          release_version="${{ inputs.release_version }}"
          package_version="$(node -p "require('./package.json').version")"
          test -n "$release_version"
          test "$release_version" = "$package_version"
          echo "release_created=true" >> "$GITHUB_OUTPUT"
          echo "tag_name=v${package_version}" >> "$GITHUB_OUTPUT"
      - uses: googleapis/release-please-action@v5
        id: release
        if: github.event_name == 'push'
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  release-validation:
    name: Validate the release tarball
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: '24.12.0'
          cache: pnpm
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - name: Build
        id: build
        continue-on-error: true
        run: pnpm run build
      - name: Pack exactly one npm artifact
        id: pack
        if: always() && steps.build.outcome == 'success'
        continue-on-error: true
        run: pnpm run pack:artifact
      - name: Unit and coverage gates
        id: unit
        continue-on-error: true
        run: pnpm run test:ci --runInBand
      - name: Contract fixture gate
        id: contracts
        if: always() && steps.pack.outcome == 'success'
        continue-on-error: true
        run: pnpm run fixtures:contract
      - name: Extended fixture gate
        id: extended
        if: always() && steps.pack.outcome == 'success'
        continue-on-error: true
        run: pnpm run fixtures:extended
      - name: Contractual core and canonical size gates
        id: size
        if: always() && steps.pack.outcome == 'success'
        continue-on-error: true
        run: node scripts/measure-release-artifact.cjs
      - name: Capture hosted performance candidate
        id: benchmark
        if: always() && steps.build.outcome == 'success'
        continue-on-error: true
        run: node --expose-gc -r ts-node/register/transpile-only benchmarks/bench.ts 100000 > bench-out.json
      - name: Gate against the reviewed baseline
        id: performance
        if: always() && steps.benchmark.outcome == 'success'
        continue-on-error: true
        run: pnpm run bench:gate
      - name: Upload release package artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-package-artifact
          path: |
            artifacts/atemporal-*.tgz
            artifacts/package-artifact.json
          if-no-files-found: warn
          retention-days: 90
      - name: Upload release validation evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-validation-evidence
          path: |
            reports/
            reports/bundler-diagnostics/
            integration/canonical-bundle/dist/*.meta.json
            coverage/
            bench-out.json
          if-no-files-found: warn
          retention-days: 90
      - name: Upload explicit reviewed performance baseline-capture artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: reviewed-performance-baseline-capture
          path: bench-out.json
          if-no-files-found: warn
          retention-days: 90
      - name: Fail after preserving validation evidence
        if: always()
        run: |
          test "${{ steps.build.outcome }}" = success
          test "${{ steps.pack.outcome }}" = success
          test "${{ steps.unit.outcome }}" = success
          test "${{ steps.contracts.outcome }}" = success
          test "${{ steps.extended.outcome }}" = success
          test "${{ steps.size.outcome }}" = success
          test "${{ steps.benchmark.outcome }}" = success
          test "${{ steps.performance.outcome }}" = success

  publish-npm:
    name: Publish validated tarball to npm
    needs: [release-please, release-validation]
    if: ${{ needs.release-please.outputs.release_created == 'true' && needs.release-validation.result == 'success' }}
    runs-on: ubuntu-24.04
    environment: npm
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: '24.12.0'
          registry-url: https://registry.npmjs.org
      - name: Download the validated package artifact
        uses: actions/download-artifact@v8
        with:
          name: release-package-artifact
          path: artifacts
      - name: Verify validated artifact metadata
        run: node -e "const path = require('./artifacts/package-artifact.json').path; if (!path || !path.startsWith('./artifacts/')) process.exit(1)"
      - name: Publish the validated tarball through npm trusted publishing
        run: |
          package_version="$(node -p "require('./package.json').version")"
          if npm view "atemporal@${package_version}" version >/dev/null 2>&1; then
            echo "atemporal@${package_version} is already published; skipping npm publish."
            exit 0
          fi
          npm publish "$(node -p "require('./artifacts/package-artifact.json').path")" --access public --tag latest

  attach-sbom:
    name: Finalize GitHub Release and attach SBOM
    needs: [release-please, publish-npm]
    if: ${{ needs.release-please.outputs.release_created == 'true' && needs.publish-npm.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: '24.12.0'
          cache: pnpm
      - run: corepack enable
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: mkdir -p sbom && pnpm sbom --sbom-format=spdx --lockfile-only --out sbom/atemporal.spdx.json
      - run: pnpm sbom --sbom-format=cyclonedx --lockfile-only --out sbom/atemporal.cdx.json
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          generate_release_notes: ${{ github.event_name == 'workflow_dispatch' }}
          files: |
            sbom/atemporal.spdx.json
            sbom/atemporal.cdx.json
          fail_on_unmatched_files: true

name: Atemporal CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION_DEFAULT: '24.x'

jobs:
  build:
    name: Build and pack the validation artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION_DEFAULT }}
          cache: pnpm
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - name: Type-check
        id: typecheck
        continue-on-error: true
        run: pnpm exec tsc --noEmit
      - name: Build
        id: build
        if: always() && steps.typecheck.outcome == 'success'
        continue-on-error: true
        run: pnpm run build
      - name: Pack exactly one npm artifact
        id: pack
        if: always() && steps.build.outcome == 'success'
        continue-on-error: true
        run: pnpm run pack:artifact
      - name: Measure contractual core and canonical bundle budgets
        id: size
        if: always() && steps.pack.outcome == 'success'
        continue-on-error: true
        run: node scripts/measure-release-artifact.cjs
      - name: Upload complete package artifact directory
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: package-artifact
          path: artifacts/
          if-no-files-found: warn
          retention-days: 7
      - name: Upload size reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: package-artifact-reports
          path: |
            reports/
            integration/canonical-bundle/dist/*.meta.json
          if-no-files-found: warn
          retention-days: 7
      - name: Fail after preserving build evidence
        if: always()
        run: |
          test "${{ steps.typecheck.outcome }}" = success
          test "${{ steps.build.outcome }}" = success
          test "${{ steps.pack.outcome }}" = success
          test "${{ steps.size.outcome }}" = success

  test:
    name: Tests (Node ${{ matrix.node-version }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22.x, 24.x, 26.x]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - name: Run unit, integration, property, fuzz, and telemetry tests
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
          TZ: UTC
          CI: 'true'
        run: pnpm run test:ci --verbose
      - name: Verify native Temporal against the production artifact
        if: matrix.node-version == '26.x'
        env:
          TZ: UTC
        run: node scripts/check-native-temporal.cjs

  contract-fixtures:
    name: Packed artifact contracts (TypeScript ${{ matrix.typescript-version }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        typescript-version: ['5.4.5', '7.0.2']
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION_DEFAULT }}
          cache: pnpm
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - name: Download the packed validation artifact
        uses: actions/download-artifact@v8
        with:
          name: package-artifact
          path: artifacts
      - name: Run packed artifact contract fixtures
        id: contracts
        continue-on-error: true
        env:
          FIXTURE_TYPESCRIPT_VERSION: ${{ matrix.typescript-version }}
        run: pnpm run fixtures:contract
      - name: Upload contract fixture evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: contract-fixtures-typescript-${{ matrix.typescript-version }}
          path: reports/fixtures/
          if-no-files-found: warn
          retention-days: 7
      - name: Fail after preserving contract evidence
        if: always()
        run: test "${{ steps.contracts.outcome }}" = success

  coverage:
    name: Coverage trend (Codecov)
    needs: test
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION_DEFAULT }}
          cache: pnpm
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - name: Run tests with all four coverage thresholds
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
          TZ: UTC
          CI: 'true'
        run: pnpm run test:ci
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: unit
          name: atemporal-ci
          fail_ci_if_error: false

  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: 'true'

  audit:
    name: Dependency audit (npm + OSV)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION_DEFAULT }}
          cache: pnpm
      - run: corepack enable
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm audit --audit-level=high
      - uses: google/osv-scanner-action/osv-scanner-action@v2.3.8
        with:
          scan-args: '--recursive . --no-ignore --config=osv-scanner.toml'

  license-check:
    name: License compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION_DEFAULT }}
          cache: pnpm
      - run: corepack enable
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: node scripts/check-licenses.js

  doc-links:
    name: Doc link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress --exclude-loopback --max-concurrency 16 --timeout 20
            --config .lychee.toml 'docs/**/*.md' 'README.md' 'CHANGELOG.md'
            'SECURITY.md' 'CONTRIBUTING.md'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  ci-success:
    name: CI success
    needs: [build, test, contract-fixtures, coverage, gitleaks, audit, license-check, doc-links]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify every required job passed
        run: |
          test "${{ needs.build.result }}" = success
          test "${{ needs.test.result }}" = success
          test "${{ needs.contract-fixtures.result }}" = success
          test "${{ needs.coverage.result }}" = success
          test "${{ needs.gitleaks.result }}" = success
          test "${{ needs.audit.result }}" = success
          test "${{ needs.license-check.result }}" = success
          test "${{ needs.doc-links.result }}" = success

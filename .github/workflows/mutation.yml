# .github/workflows/mutation.yml
name: Mutation testing (Stryker, nightly)

# Mutation testing is intentionally NOT run on every PR because it is slow.
# Pushes to main run a Stryker dry-run so config/test discovery regressions
# are caught quickly. The full mutation suite runs nightly/on demand as an
# advisory quality signal and uploads reports when it completes.

on:
  schedule:
    # Every day at 04:00 UTC (off-peak, deterministic enough to surface trends).
    - cron: '0 4 * * *'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: mutation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mutation:
    name: Stryker mutation testing
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1

      - name: Use Node.js 20.x
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: pnpm

      - name: Install dependencies
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - name: Run Stryker smoke check
        if: github.event_name == 'push'
        env:
          NODE_OPTIONS: '--max-old-space-size=6144'
          TZ: 'UTC'
        run: pnpm run test:mutation --dryRunOnly

      - name: Run full Stryker mutation suite
        id: stryker_full
        if: github.event_name != 'push'
        continue-on-error: true
        timeout-minutes: 55
        env:
          NODE_OPTIONS: '--max-old-space-size=6144'
          TZ: 'UTC'
        run: pnpm run test:mutation

      - name: Surface advisory mutation failure
        if: github.event_name != 'push' && steps.stryker_full.outcome == 'failure'
        run: |
          echo "::warning::Full mutation testing did not complete cleanly. Check the Stryker artifact/logs; push CI still validates configuration with --dryRunOnly."

      - name: Upload Stryker reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: stryker-reports
          path: reports/mutation
          retention-days: 30

      - name: Write mutation score summary
        if: always() && github.event_name != 'push'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('node:fs');
            const path = 'reports/mutation/mutation.json';
            if (!fs.existsSync(path)) {
              core.warning('No mutation.json produced; skipping summary.');
              return;
            }
            const data = JSON.parse(fs.readFileSync(path, 'utf8'));
            const score = data.metrics?.mutationScore;
            if (typeof score !== 'number') return;
            const pct = (score * 100).toFixed(2);
            core.summary.addHeading('Mutation score', 1);
            core.summary.addText(`Mutation score: **${pct}%** (nightly/advisory run).`);
            await core.summary.write();

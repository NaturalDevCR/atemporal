name: Capture hosted performance baseline candidate

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  capture:
    name: Capture proposed hosted baseline
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: '24.12.0'
          cache: pnpm
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - name: Generate the proposed schema baseline
        run: |
          mkdir -p artifacts
          node --expose-gc -r ts-node/register/transpile-only benchmarks/bench.ts 100000 > artifacts/proposed-performance-baseline.json
      - name: Upload proposed hosted performance baseline for human review
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: proposed-hosted-performance-baseline
          path: artifacts/proposed-performance-baseline.json
          if-no-files-found: error
          retention-days: 90
